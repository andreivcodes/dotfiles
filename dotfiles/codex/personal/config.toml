model = "gpt-5.4"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"
env_http_headers = { CONTEXT7_API_KEY = "CONTEXT7_API_KEY" }

[mcp_servers.gh_grep]
url = "https://mcp.grep.app"

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"
bearer_token_env_var = "EXA_API_KEY"

[mcp_servers.railway]
command = "npx"
args = ["-y", "@railway/mcp-server"]

[mcp_servers.figma-desktop]
url = "http://127.0.0.1:3845/mcp"

[notice]
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.4"

[features]
multi_agent = true

[projects."/Users/andrei/git/milkroad-sanity"]
trust_level = "trusted"

[projects."/Users/andrei/git/ai-presentation"]
trust_level = "trusted"

[projects."/Users/andrei/git/houseofstake.org-hos-repo"]
trust_level = "trusted"

[projects."/Users/andrei"]
trust_level = "trusted"

[projects."/Users/andrei/git/andreiv.com"]
trust_level = "trusted"

[projects."/Users/andrei/git/data-commons"]
trust_level = "trusted"

[projects."/Users/andrei/git/dotfiles"]
